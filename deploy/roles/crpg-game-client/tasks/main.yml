---

- name: get Bannerlord installation path
  set_fact:
    crpg_game_client_local_path: "{{ lookup('env', 'MB_CLIENT_PATH') }}"

- name: assert Bannerlord installation path is defined
  assert:
    that: crpg_game_client_local_path | length > 0

- name: Manually remove specified files and directories with shell command
  shell:
    cmd: "rm -rf {{ item }}"
  loop:
    - /tmp/rest.tar.gz
    - /tmp/rest.tar
    - /tmp/AssetPackages
    - /tmp/SceneObj
    - /tmp/hash.xml
  delegate_to: localhost
  become: false

- name: check game client files
  stat:
    path: "{{ crpg_game_client_local_path }}/Modules/cRPG/{{ item }}"
  loop:
    - "AssetPackages"
    - "SceneObj"
    - "bin/Win64_Shipping_Client/Crpg.Module.dll"
  register: file_stats
  delegate_to: localhost
  become: false

- name: assert game client files are present
  assert:
    that: item.stat.exists
    fail_msg: "{{ item.item }} was not found"
  loop: "{{ file_stats.results }}"
  delegate_to: localhost
  become: false

- name: Hashing Module
  shell: "dotnet run {{ playbook_dir }}/../script/hash.cs -- --hash '{{ crpg_game_client_local_path }}/Modules/cRPG' --output '/tmp/hash.xml'"
  delegate_to: localhost
  become: false

- name: Get list of directories in SceneObj
  shell:
    cmd: 'ls -d "{{ crpg_game_client_local_path }}/Modules/cRPG/SceneObj/"*'
  register: sceneobj_dirs
  delegate_to: localhost
  become: false

- name: Ensure /tmp/AssetPackages directory exists
  file:
    path: /tmp/AssetPackages
    state: directory
  delegate_to: localhost
  become: false

- name: Ensure /tmp/SceneObj directory exists
  file:
    path: /tmp/SceneObj
    state: directory
  delegate_to: localhost
  become: false


- name: Tar subfolders of SceneObj with the folder name at the first level
  shell:
    cmd: "tar -cf /tmp/SceneObj/{{ item.split('/')[-1] }}.tar -C '{{ item | dirname }}' '{{ item | basename }}'"
  loop: "{{ sceneobj_dirs.stdout_lines }}"
  delegate_to: localhost
  become: false

- name: Tar files in AssetPackages
  command:
    cmd: "tar -cf /tmp/AssetPackages/{{ item | basename }}.tar -C '{{ crpg_game_client_local_path }}/Modules/cRPG/AssetPackages' {{ item | basename }}"
  loop: "{{ lookup('fileglob', crpg_game_client_local_path + '/Modules/cRPG/AssetPackages/*', wantlist=True) }}"
  delegate_to: localhost
  become: false

- name: Tar GUI, ModuleSounds, bin, ModuleData, and SubModule.xml
  command:
    cmd: "tar -cf /tmp/rest.tar -C '{{ crpg_game_client_local_path }}/Modules/cRPG' GUI ModuleSounds bin ModuleData SubModule.xml"
  delegate_to: localhost
  become: false

- name: Compress files in /tmp/AssetPackages with gzip
  shell:
    cmd: "gzip -f /tmp/AssetPackages/*.tar"
  delegate_to: localhost
  become: false

- name: Compress files in /tmp/SceneObj with gzip
  shell:
    cmd: "gzip -f /tmp/SceneObj/*.tar"
  delegate_to: localhost
  become: false

- name: Compress /tmp/rest.tar with gzip
  shell:
    cmd: "gzip -f /tmp/rest.tar"
  delegate_to: localhost
  become: false

- name: Copy rest.tar.gz to destination
  copy:
    src: /tmp/rest.tar.gz
    dest: "{{ crpg_ui_path }}/rest.tar.gz"
    owner: nginx
    group: nginx

- name: Ensure SceneObj directory exists
  file:
    path: "{{ crpg_ui_path }}/SceneObj"
    state: directory
    owner: nginx
    group: nginx

- name: Copy hash to destination
  copy:
    src: /tmp/hash.xml
    dest: "{{ crpg_ui_path }}"
    owner: nginx
    group: nginx

- name: Copy contents of SceneObj to destination
  copy:
    src: /tmp/SceneObj
    dest: "{{ crpg_ui_path }}"
    owner: nginx
    group: nginx

- name: Copy contents of AssetPackages to destination
  copy:
    src: /tmp/AssetPackages
    dest: "{{ crpg_ui_path }}"
    owner: nginx
    group: nginx

- name: Read mod version from SubModule.xml
  shell: "grep -oP 'Version value=\"v\\K[^\"]+' '{{ crpg_game_client_local_path }}/Modules/cRPG/SubModule.xml'"
  delegate_to: localhost
  become: false
  register: mod_version_result

- name: Set version facts
  set_fact:
    crpg_version: "{{ mod_version_result.stdout }}"
    crpg_bannerlord_version: "{{ mod_version_result.stdout | regex_replace('\\.[^.]+$', '') }}"

- name: Convert WSL path to Windows path
  shell: "wslpath -w '{{ crpg_game_client_local_path }}'"
  register: windows_path_result
  delegate_to: localhost
  become: false

- name: Set Windows path facts
  set_fact:
    crpg_game_client_windows_path: "{{ windows_path_result.stdout }}"

- name: Generate WorkshopUpdate.xml
  copy:
    content: |
      <Tasks>
          <GetItem>
              <ItemId Value="2878356589"/>
          </GetItem>
          <UpdateItem>
              <ModuleFolder Value="{{ crpg_game_client_windows_path | regex_replace('&', '&amp;') }}\Modules\cRPG" />
              <ChangeNotes Value="{{ crpg_version }}" />
              <Tags>
                  <Tag Value="Multiplayer" />
                  <Tag Value="v{{ crpg_bannerlord_version }}" />
              </Tags>
          </UpdateItem>
      </Tasks>
    dest: "{{ crpg_game_client_local_path }}/WorkshopUpdate.xml"
  delegate_to: localhost
  become: false

- name: Upload mod to Steam Workshop
  shell: 'script -qc "\"{{ crpg_game_client_local_path }}/bin/Win64_Shipping_Client/TaleWorlds.MountAndBlade.SteamWorkshop.exe\" \"{{ crpg_game_client_windows_path }}\\WorkshopUpdate.xml\"" /dev/null'
  delegate_to: localhost
  become: false

- name: Remove specified files and directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/rest.tar.gz
    - /tmp/rest.tar
    - /tmp/AssetPackages
    - /tmp/SceneObj
    - /tmp/hash.xml

- name: Remove local WorkshopUpdate.xml
  file:
    path: "{{ crpg_game_client_local_path }}/WorkshopUpdate.xml"
    state: absent
  delegate_to: localhost
  become: false
