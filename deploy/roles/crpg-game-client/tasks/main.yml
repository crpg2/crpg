---

- name: get Bannerlord installation path
  set_fact:
    crpg_game_client_local_path: "{{ lookup('env', 'MB_CLIENT_PATH') }}"

- name: assert Bannerlord installation path is defined
  assert:
    that: crpg_game_client_local_path | length > 0

- name: Manually remove specified files and directories with shell command
  shell:
    cmd: "rm -rf {{ item }}"
  loop:
    - /tmp/rest.tar.gz
    - /tmp/rest.tar
    - /tmp/AssetPackages
    - /tmp/SceneObj
    - /tmp/hash.xml
    - /tmp/hash_old.xml
  delegate_to: localhost
  become: false

- name: check game client files
  stat:
    path: "{{ crpg_game_client_local_path }}/Modules/cRPG/{{ item }}"
  loop:
    - "AssetPackages/pack0.tpac" # The only tpac that meow does not provide
    - "SceneObj"
    - "bin/Win64_Shipping_Client/Crpg.Module.dll"
  register: file_stats
  delegate_to: localhost
  become: false

- name: assert game client files are present
  assert:
    that: item.stat.exists
    fail_msg: "{{ item.item }} was not found"
  loop: "{{ file_stats.results }}"
  delegate_to: localhost
  become: false

- name: Hashing Module
  shell: "dotnet run {{ playbook_dir }}/../script/hash.cs -- --hash '{{ crpg_game_client_local_path }}/Modules/cRPG' --output '/tmp/hash.xml'"
  delegate_to: localhost
  become: false

- name: Fetch existing hash.xml from server
  fetch:
    src: "{{ crpg_ui_path }}/hash.xml"
    dest: /tmp/hash_old.xml
    flat: yes
  ignore_errors: yes

- name: Compute changed assets and maps
  shell: |
    python3 << 'PYEOF'
    import xml.etree.ElementTree as ET
    import json, os

    new_root = ET.parse('/tmp/hash.xml').getroot()

    if not os.path.exists('/tmp/hash_old.xml'):
        assets = [a.get('Name') for a in new_root.findall('.//Asset')]
        maps = [m.get('Name') for m in new_root.findall('.//Map')]
        print(json.dumps({'assets': assets, 'maps': maps, 'rest': True}))
    else:
        old_root = ET.parse('/tmp/hash_old.xml').getroot()

        old_assets = {a.get('Name'): a.get('Hash') for a in old_root.findall('.//Asset')}
        old_maps = {m.get('Name'): m.get('Hash') for m in old_root.findall('.//Map')}
        old_rest_el = old_root.find('Rest')
        old_rest_hash = old_rest_el.get('Hash') if old_rest_el is not None else None

        changed_assets = [
            a.get('Name') for a in new_root.findall('.//Asset')
            if old_assets.get(a.get('Name')) != a.get('Hash')
        ]
        changed_maps = [
            m.get('Name') for m in new_root.findall('.//Map')
            if old_maps.get(m.get('Name')) != m.get('Hash')
        ]
        new_rest_el = new_root.find('Rest')
        rest_changed = new_rest_el is None or new_rest_el.get('Hash') != old_rest_hash

        print(json.dumps({'assets': changed_assets, 'maps': changed_maps, 'rest': rest_changed}))
    PYEOF
  delegate_to: localhost
  become: false
  register: hash_diff_result

- name: Set changed component facts
  set_fact:
    crpg_changed_assets: "{{ (hash_diff_result.stdout | from_json).assets }}"
    crpg_changed_maps: "{{ (hash_diff_result.stdout | from_json).maps }}"
    crpg_rest_changed: "{{ (hash_diff_result.stdout | from_json).rest }}"

- name: Get list of directories in SceneObj
  shell:
    cmd: 'ls -d "{{ crpg_game_client_local_path }}/Modules/cRPG/SceneObj/"*'
  register: sceneobj_dirs
  delegate_to: localhost
  become: false

- name: Ensure /tmp/AssetPackages directory exists
  file:
    path: /tmp/AssetPackages
    state: directory
  delegate_to: localhost
  become: false

- name: Ensure /tmp/SceneObj directory exists
  file:
    path: /tmp/SceneObj
    state: directory
  delegate_to: localhost
  become: false


- name: Tar subfolders of SceneObj with the folder name at the first level
  shell:
    cmd: "tar -cf /tmp/SceneObj/{{ item.split('/')[-1] }}.tar -C '{{ item | dirname }}' '{{ item | basename }}'"
  loop: "{{ sceneobj_dirs.stdout_lines }}"
  when: item.split('/')[-1] in crpg_changed_maps
  delegate_to: localhost
  become: false

- name: Tar files in AssetPackages
  command:
    cmd: "tar -cf /tmp/AssetPackages/{{ item | basename }}.tar -C '{{ crpg_game_client_local_path }}/Modules/cRPG/AssetPackages' {{ item | basename }}"
  loop: "{{ lookup('fileglob', crpg_game_client_local_path + '/Modules/cRPG/AssetPackages/*', wantlist=True) }}"
  when: item | basename in crpg_changed_assets
  delegate_to: localhost
  become: false

- name: Tar GUI, ModuleSounds, bin, ModuleData, and SubModule.xml
  command:
    cmd: "tar -cf /tmp/rest.tar -C '{{ crpg_game_client_local_path }}/Modules/cRPG' GUI ModuleSounds bin ModuleData SubModule.xml"
  when: crpg_rest_changed
  delegate_to: localhost
  become: false

- name: Compress files in /tmp/AssetPackages with gzip
  shell:
    cmd: "gzip -f /tmp/AssetPackages/*.tar"
  when: crpg_changed_assets | length > 0
  delegate_to: localhost
  become: false

- name: Compress files in /tmp/SceneObj with gzip
  shell:
    cmd: "gzip -f /tmp/SceneObj/*.tar"
  when: crpg_changed_maps | length > 0
  delegate_to: localhost
  become: false

- name: Compress /tmp/rest.tar with gzip
  shell:
    cmd: "gzip -f /tmp/rest.tar"
  when: crpg_rest_changed
  delegate_to: localhost
  become: false

- name: Copy rest.tar.gz to destination
  copy:
    src: /tmp/rest.tar.gz
    dest: "{{ crpg_ui_path }}/rest.tar.gz"
    owner: nginx
    group: nginx
  when: crpg_rest_changed

- name: Ensure SceneObj directory exists
  file:
    path: "{{ crpg_ui_path }}/SceneObj"
    state: directory
    owner: nginx
    group: nginx

- name: Ensure AssetPackages directory exists
  file:
    path: "{{ crpg_ui_path }}/AssetPackages"
    state: directory
    owner: nginx
    group: nginx

- name: Copy hash to destination
  copy:
    src: /tmp/hash.xml
    dest: "{{ crpg_ui_path }}"
    owner: nginx
    group: nginx

- name: Copy changed SceneObj maps to destination
  copy:
    src: "/tmp/SceneObj/{{ item }}.tar.gz"
    dest: "{{ crpg_ui_path }}/SceneObj/{{ item }}.tar.gz"
    owner: nginx
    group: nginx
  loop: "{{ crpg_changed_maps }}"

- name: Copy changed AssetPackages to destination
  copy:
    src: "/tmp/AssetPackages/{{ item }}.tar.gz"
    dest: "{{ crpg_ui_path }}/AssetPackages/{{ item }}.tar.gz"
    owner: nginx
    group: nginx
  loop: "{{ crpg_changed_assets }}"

- name: Read mod version from SubModule.xml
  shell: "grep -oP 'Version value=\"v\\K[^\"]+' '{{ crpg_game_client_local_path }}/Modules/cRPG/SubModule.xml'"
  delegate_to: localhost
  become: false
  register: mod_version_result

- name: Set version facts
  set_fact:
    crpg_version: "{{ mod_version_result.stdout }}"
    crpg_bannerlord_version: "{{ mod_version_result.stdout | regex_replace('\\.[^.]+$', '') }}"

- name: Convert WSL path to Windows path
  shell: "wslpath -w '{{ crpg_game_client_local_path }}'"
  register: windows_path_result
  delegate_to: localhost
  become: false

- name: Set Windows path facts
  set_fact:
    crpg_game_client_windows_path: "{{ windows_path_result.stdout }}"

- name: Generate WorkshopUpdate.xml
  copy:
    content: |
      <Tasks>
          <GetItem>
              <ItemId Value="2878356589"/>
          </GetItem>
          <UpdateItem>
              <ModuleFolder Value="{{ crpg_game_client_windows_path | regex_replace('&', '&amp;') }}\Modules\cRPG" />
              <ChangeNotes Value="{{ crpg_version }}" />
              <Tags>
                  <Tag Value="Multiplayer" />
                  <Tag Value="v{{ crpg_bannerlord_version }}" />
              </Tags>
          </UpdateItem>
      </Tasks>
    dest: "{{ crpg_game_client_local_path }}/WorkshopUpdate.xml"
  delegate_to: localhost
  become: false

- name: Upload mod to Steam Workshop
  shell: 'script -qc "\"{{ crpg_game_client_local_path }}/bin/Win64_Shipping_Client/TaleWorlds.MountAndBlade.SteamWorkshop.exe\" \"{{ crpg_game_client_windows_path }}\\WorkshopUpdate.xml\"" /dev/null'
  delegate_to: localhost
  become: false

- name: Remove specified files and directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/rest.tar.gz
    - /tmp/rest.tar
    - /tmp/AssetPackages
    - /tmp/SceneObj
    - /tmp/hash.xml

- name: Remove local WorkshopUpdate.xml
  file:
    path: "{{ crpg_game_client_local_path }}/WorkshopUpdate.xml"
    state: absent
  delegate_to: localhost
  become: false

- name: Remove local hash_old.xml
  file:
    path: /tmp/hash_old.xml
    state: absent
  delegate_to: localhost
  become: false
